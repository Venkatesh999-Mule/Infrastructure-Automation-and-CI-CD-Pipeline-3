apiVersion: apps/v1
kind: Deployment
metadata:
  name: infra-pipeline
spec:
  replicas: 2
  selector:
    matchLabels:
      app: infra-pipeline
  strategy:
    type: RollingUpdate        # new - zero downtime deploy
    rollingUpdate:
      maxSurge: 1              # start 1 new pod before killing old
      maxUnavailable: 0        # never kill old pod until new is ready
  template:
    metadata:
      labels:
        app: infra-pipeline
    spec:
      containers:
      - name: infra-pipeline
        image: mulevenkatesh/infra-pipeline:latest
        ports:
        - containerPort: 8080
        readinessProbe:        # new - K8s checks app before sending traffic
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5